<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="256" height="256" role="img" aria-label="No smoking">
  <defs>
    <!-- Soft smoke -->
    <filter id="smokeBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2"></feGaussianBlur>
    </filter>

    <!-- Fade mask for smoke (top fades out smoothly) -->
    <linearGradient id="smokeFade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"></stop>
      <stop offset="55%" stop-color="white" stop-opacity="0.85"></stop>
      <stop offset="100%" stop-color="white" stop-opacity="0"></stop>
    </linearGradient>
    <mask id="smokeMask">
      <rect x="0" y="0" width="512" height="512" fill="black"></rect>
      <!-- area where smoke is visible -->
      <rect x="250" y="110" width="170" height="210" fill="url(#smokeFade)"></rect>
    </mask>
  </defs>

  <!-- Background -->
  <rect x="12" y="12" width="488" height="488" rx="56" fill="#000"></rect>

  <!-- Static sign -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#fff" stroke-width="36"></circle>
  <line x1="150" y1="150" x2="362" y2="362" stroke="#fff" stroke-width="44" stroke-linecap="round"></line>

  <!-- Cigarette -->
  <rect x="150" y="305" width="230" height="44" fill="#fff"></rect>
  <rect x="360" y="305" width="10" height="44" fill="#000" opacity="0.15"></rect>
  <rect x="374" y="305" width="10" height="44" fill="#000" opacity="0.15"></rect>

  <!-- Smooth looping smoke -->
  <g mask="url(#smokeMask)" filter="url(#smokeBlur)" opacity="0.95">
    <!-- We animate two soft “ribbons” to look continuous -->
    <g>
      <!-- ribbon 1 -->
      <path d="M308 306
               C296 282 326 268 308 248
               C292 230 308 214 320 198
               C332 182 318 168 306 154" fill="none" stroke="#fff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.55">
        <!-- float up -->
        <animateTransform attributeName="transform" type="translate" values="0 18; 0 -26" dur="2.6s" repeatCount="indefinite" keyTimes="0;1" calcMode="spline" keySplines="0.33 0 0.2 1"></animateTransform>
        <!-- gentle side-to-side -->
        <animateTransform attributeName="transform" additive="sum" type="translate" values="-6 0; 6 0; -6 0" dur="1.9s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animateTransform>
        <!-- subtle thickness breathing -->
        <animate attributeName="stroke-width" values="15;17;15" dur="2.2s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
        <!-- opacity breathing -->
        <animate attributeName="opacity" values="0.35;0.65;0.35" dur="2.6s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
      </path>

      <!-- ribbon 2 (offset in time) -->
      <path d="M340 308
               C326 282 356 270 340 246
               C326 226 352 214 344 196
               C336 178 350 166 360 154" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
        <animateTransform attributeName="transform" type="translate" values="0 22; 0 -30" dur="2.8s" begin="0.35s" repeatCount="indefinite" keyTimes="0;1" calcMode="spline" keySplines="0.33 0 0.2 1"></animateTransform>
        <animateTransform attributeName="transform" additive="sum" type="translate" values="7 0; -7 0; 7 0" dur="2.1s" begin="0.35s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animateTransform>
        <animate attributeName="stroke-width" values="13;16;13" dur="2.4s" begin="0.35s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
        <animate attributeName="opacity" values="0.25;0.6;0.25" dur="2.8s" begin="0.35s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
      </path>
    </g>
  </g>
</svg>
