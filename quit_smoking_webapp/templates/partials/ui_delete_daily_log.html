<form method="post"
      hx-post="{% url 'ui_daily_log_delete' log.id %}"
      hx-target="#main"
      hx-push-url="true">
  {% csrf_token %}

  <p>Are you sure you want to delete this log?</p>

  <button type="submit">Yes, delete</button>
  <button type="button"
          hx-get="{% url 'ui_daily_log' %}"
          hx-target="#main">
    Cancel
  </button>
</form>
