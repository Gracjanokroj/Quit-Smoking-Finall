<style>
  form p {
    margin: 0 0 12px;
  }

  form input:not([type="checkbox"]):not([type="radio"]),
  form select,
  form textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #334155;
    border-radius: 6px;
    background: #0f172a;
    color: white;
  }

  form input[type="checkbox"] {
    width: auto;
    margin-right: 8px;
    vertical-align: middle;
  }

  form label {
    margin-bottom: 6px;
  }

  .errorlist {
    color: #f87171;
    margin: 0 0 12px;
  }
</style>

<h2 style="margin:0 0 8px; font-size:14px;">Your Starting Point</h2>
<p style="margin:0; font-size:13px; line-height:1.55; color:rgba(232,238,251,.70);">
  Starting point

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Update</button>
    </form>
</p>
