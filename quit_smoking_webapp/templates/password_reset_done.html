<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password reset sent</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
     body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(800px 450px at 15% 10%, rgba(55,210,130,.10), transparent 60%),
        radial-gradient(700px 450px at 90% 15%, rgba(95,140,255,.10), transparent 60%),
        #070a10;
      color: #e8eefb;
      overflow-x: hidden;
    }
  </style>
</head>

<body class="min-h-screen text-white flex items-center justify-center px-4">
  <div class="w-full max-w-md rounded-lg p-6 text-center">
    <h1 class="mb-3">Check your email</h1>
    <p class="mb-5">If the address exists, a reset link has been sent.</p>

    <a href="{% url 'login' %}" class="inline-block rounded-md bg-green-500 px-4 py-2 text-black">
      Back to login
    </a>
  </div>
</body>
</html>
