<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(800px 450px at 15% 10%, rgba(55,210,130,.10), transparent 60%),
        radial-gradient(700px 450px at 90% 15%, rgba(95,140,255,.10), transparent 60%),
        #070a10;
      color: #e8eefb;
      overflow-x: hidden;
    }
    
    form p {
      margin: 0 0 12px;
    }

    form label {
      display: block;
      margin-bottom: 6px;
    }

    form input:not([type="checkbox"]):not([type="radio"]),
    form select,
    form textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #0f172a;
      color: white;
    }

    form input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
      vertical-align: middle;
    }

    .helptext {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: #94a3b8;
    }

    .errorlist {
      color: #f87171;
      margin: 0 0 12px;
    }
  </style>
</head>

<body class="min-h-screen text-white px-4 py-8">
  <div class="mx-auto w-full max-w-md p-6">
    <div class="mb-4 flex items-center justify-between">
      <a href="{% url 'welcome' %}" class="hover:underline">← Home</a>
      <a href="{% url 'login' %}" class="hover:underline">Log in</a>
    </div>

    <h1 class="mb-2">Create account</h1>
    <p class="mb-4">
      Register to start using the app and track your progress.
    </p>

    <form method="post" novalidate class="space-y-4">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="flex gap-2">
        <button type="submit" class="rounded-md bg-green-500 px-4 py-2 text-black">
          Create account
        </button>
        <a href="{% url 'welcome' %}" class="rounded-md px-4 py-2">
          Cancel
        </a>
      </div>
    </form>

    <p class="mt-4">
      Already have an account?
      <a href="{% url 'login' %}" class="hover:underline">Log in here</a>.
    </p>
  </div>
</body>
</html>
