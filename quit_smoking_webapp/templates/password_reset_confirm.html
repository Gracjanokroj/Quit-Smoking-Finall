<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set new password</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
     body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(800px 450px at 15% 10%, rgba(55,210,130,.10), transparent 60%),
        radial-gradient(700px 450px at 90% 15%, rgba(95,140,255,.10), transparent 60%),
        #070a10;
      color: #e8eefb;
      overflow-x: hidden;
    }
    
    form p {
      margin: 0 0 12px;
    }

    form label {
      display: block;
      margin-bottom: 6px;
    }

    form input:not([type="checkbox"]):not([type="radio"]),
    form select,
    form textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #0f172a;
      color: white;
    }

    .errorlist {
      color: #f87171;
      margin: 0 0 12px;
    }
  </style>
</head>

<body class="min-h-screen text-white flex items-center justify-center px-4">
  <div class="w-full max-w-md p-6">
    <h1 class="mb-4">Set new password</h1>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="w-full rounded-md bg-green-500 px-4 py-2 text-black">
        Save password
      </button>
    </form>

    <p class="mt-4 text-sm">
      <a href="{% url 'login' %}" class="hover:underline">Back to login</a>
    </p>
  </div>
</body>
</html>
