version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_django
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: okroj
      MYSQL_DATABASE: quit_smoking_db
      MYSQL_USER: gracjan
      MYSQL_PASSWORD: okroj
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
